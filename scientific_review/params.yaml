# scientific_review/params.yaml
# параметры приложения

models:
  baseline: "nvidia/nemotron-3-nano-30b-a3b:free"
  agent: "nvidia/nemotron-3-nano-30b-a3b:free"
  judge: "nvidia/nemotron-3-nano-30b-a3b:free"

openrouter:
  base_url: "https://openrouter.ai/api/v1/chat/completions"
  timeout: 60

evaluation:
  concurrency: 5
  runs: 5

paths:
  quality_results: "runs/quality"
  stability_results: "runs/stability"
  ablation_results: "runs/ablation"
  multiagent_results: "runs/multiagent"
  baseline_results: "runs/baseline"
  dataset: "data/processed/peerread.json"

criteria:
  order:
    - NoveltyAgent
    - ScientificityAgent
    - ReadabilityAgent
    - ComplexityAgent
