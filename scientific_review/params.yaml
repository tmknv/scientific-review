# scientific_review/params.yaml
# параметры приложения

models:
  baseline: "openai/gpt-oss-120b:free"
  agent: "nvidia/nemotron-3-nano-30b-a3b:free"
  judge: "openai/gpt-oss-120b:free"

openrouter:
  base_url: "https://openrouter.ai/api/v1/chat/completions"
  timeout: 60

evaluation:
  concurrency: 1 # количество параллельных запросов
  runs: 5 # количество прогонов статьи для оценки stability

paths:
  quality_results: "runs/quality"
  stability_results: "runs/stability"
  ablation_results: "runs/ablation"
  multiagent_results: "runs/multiagent"
  baseline_results: "runs/baseline"
  dataset: "data/processed/peerread.json"

criteria:
  order: # порядок критериев
    - novelty
    - scientificity
    - readability
    - complexity
  
  names: # имена критериальных агентов
    - NoveltyAgent
    - ScientificityAgent
    - ReadabilityAgent
    - ComplexityAgent
