# все промпты системы: baseline, агенты, judge

baseline: |
  You are a scientific reviewer.

  Evaluate the following paper.

  Return STRICT JSON:
  {{
    "scores": {{
      "novelty": 1-10,
      "scientificity": 1-10,
      "readability": 1-10,
      "complexity": 1-10
    }},
    "final_score": 1-10,
    "verdict": "accept/revise/reject",
    "review": "full review text"
  }}

  Paper:
  {text}

novelty: |
  You are a scientific reviewer.

  Evaluate the NOVELTY of the following paper.

  Return STRICT JSON:
  {{
    "score": 1-10,
    "reason": "short explanation"
  }}

  Paper:
  {text}

scientificity: |
  You are a scientific reviewer.

  Evaluate the SCIENTIFIC VALIDITY of the following paper.

  Return STRICT JSON:
  {{
    "score": 1-10,
    "reason": "short explanation"
  }}

  Paper:
  {text}

readability: |
  You are a scientific reviewer.

  Evaluate the READABILITY of the following paper.

  Return STRICT JSON:
  {{
    "score": 1-10,
    "reason": "short explanation"
  }}

  Paper:
  {text}

complexity: |
  You are a scientific reviewer.

  Evaluate the TECHNICAL COMPLEXITY of the following paper.

  Return STRICT JSON:
  {{
    "score": 1-10,
    "reason": "short explanation"
  }}

  Paper:
  {text}
