# все промпты системы: baseline, агенты, judge

novelty: |
  You are a scientific reviewer.

  Evaluate the NOVELTY of the following paper.

  Return STRICT JSON:
  {{
    "score": 1-10,
    "reason": "short explanation"
  }}

  Paper:
  {text}

